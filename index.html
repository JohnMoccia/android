<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trillboards SDK — Curb Mobility</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #e0e0e0; font-family: monospace; min-height: 100vh; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid #1e1e1e; }
    .logo { font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase; color: #c8f135; font-weight: bold; }
    .logo span { color: #555; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #c8f135; display: inline-block; margin-right: 6px; }
    .main { display: flex; height: calc(100vh - 53px); }
    .ad-stage { flex: 1; background: #000; position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    .sidebar { width: 280px; background: #0f0f0f; border-left: 1px solid #1e1e1e; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
    .panel-title { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: #555; margin-bottom: 10px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #1a1a1a; }
    .stat-key { font-size: 11px; color: #666; }
    .stat-val { font-size: 11px; color: #888; word-break: break-all; text-align: right; max-width: 160px; }
    .stat-val.ok { color: #c8f135; }
    button { padding: 8px 14px; font-size: 11px; font-family: monospace; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; border-radius: 3px; margin: 4px; width: 100%; }
    button.primary { background: #c8f135; color: #000; border-color: #c8f135; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Curb <span>/</span> Trillboards SDK Test</div>
    <div><span id="status-dot"></span><span id="status-text">live</span></div>
  </div>
  <div class="main">
    <div class="ad-stage">
      <iframe
        id="ad-frame"
        src="https://screen.trillboards.com/partner-sdk/embed.html?device=P_691cbdd4b3117cb1b692f4ae&waterfall=programmatic_only"
        allow="autoplay; fullscreen"
        allowfullscreen>
      </iframe>
    </div>
    <div class="sidebar">
      <div>
        <div class="panel-title">Device Config</div>
        <div class="stat-row"><span class="stat-key">fingerprint</span><span class="stat-val ok">P_691cbdd4b3117cb1b692f4ae</span></div>
        <div class="stat-row"><span class="stat-key">screen_id</span><span class="stat-val">69a076ad2ccbba67a5ba1c1e</span></div>
        <div class="stat-row"><span class="stat-key">waterfall</span><span class="stat-val ok">programmatic_only</span></div>
        <div class="stat-row"><span class="stat-key">venue</span><span class="stat-val">transportation/taxi</span></div>
      </div>
      <div>
        <div class="panel-title">Embed Status</div>
        <div class="stat-row"><span class="stat-key">source</span><span class="stat-val ok">screen.trillboards.com</span></div>
        <div class="stat-row"><span class="stat-key">IMA</span><span class="stat-val ok">managed by Trillboards</span></div>
        <div class="stat-row"><span class="stat-key">waterfall</span><span class="stat-val ok">managed by Trillboards</span></div>
      </div>
      <div>
        <button class="primary" onclick="reloadAd()">Reload Ad</button>
        <button onclick="toggleFullscreen()">Fullscreen</button>
      </div>
    </div>
  </div>
<script>
  function reloadAd() {
    const frame = document.getElementById('ad-frame');
    frame.src = frame.src;
  }
  function toggleFullscreen() {
    const frame = document.getElementById('ad-frame');
    if (frame.requestFullscreen) frame.requestFullscreen();
    else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
  }
</script>
</body>
</html>
